# =============================================================================
# PRE-COMMIT HOOKS CONFIGURATION
# =============================================================================
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files

repos:
  # All hooks use local uv environment for Python 3.14 compatibility
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [src/]
